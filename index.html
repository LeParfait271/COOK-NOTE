<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Cook Note</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- SEO -->
  <meta name="description" content="Cook Note : carnet de recettes maison avec ingrédients, étapes, variantes, techniques de cuisine, favoris et liste de courses." />
  <meta name="author" content="Cook Note" />
  <meta name="theme-color" content="#fbbf24" />
  <meta name="color-scheme" content="dark" />

  <!-- Open Graph -->
  <meta property="og:title"       content="Cook Note" />
  <meta property="og:description" content="Carnet de recettes maison avec variantes, techniques, favoris et liste de courses." />
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://cook-note.pages.dev/" />
  <meta property="og:image"       content="https://cook-note.pages.dev/assets/base-du-site.png?v=45" />
  <meta property="og:image:secure_url" content="https://cook-note.pages.dev/assets/base-du-site.png?v=45" />
  <meta property="og:image:width" content="1536" />
  <meta property="og:image:height" content="1024" />
  <meta property="og:image:alt"   content="Cook Note" />
  <meta name="twitter:card"       content="summary_large_image" />
  <meta name="twitter:title"      content="Cook Note" />
  <meta name="twitter:description" content="Carnet de recettes maison avec variantes, techniques, favoris et liste de courses." />
  <meta name="twitter:image"      content="https://cook-note.pages.dev/assets/base-du-site.png?v=45" />
  <link rel="canonical" href="https://cook-note.pages.dev/" />
  <script id="recipe-jsonld" type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Cook Note",
      "description": "Cook Note : carnet de recettes maison avec ingrédients, étapes, variantes, techniques de cuisine, favoris et liste de courses.",
      "url": "https://cook-note.pages.dev/"
    }
  </script>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/assets/cook-note-mark.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/assets/cook-note.png" />
  <link rel="preload" as="image" href="/assets/base-principale-fond-site.jpg" />

  <!-- Styles -->
  <link rel="stylesheet" href="/style.css?v=110" />

  <!-- Librairies locales pour garder le site autonome -->
  <script src="/assets/vendor/react.production.min.js"></script>
  <script src="/assets/vendor/react-dom.production.min.js"></script>

  <!-- Confetti + QR code -->
  <script src="/assets/vendor/confetti.browser.min.js"></script>
  <script src="/assets/vendor/qrcode.min.js"></script>
</head>
<body>
  <!-- Écran de chargement — caché par React au montage (voir app.js) -->
  <div id="loading-screen" aria-hidden="true">
    <div class="loading-scene">
      <img src="/assets/cook-note.png" alt="Cook Note" />
      <div class="loading-shell">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="loading-bar"><span></span></div>
    </div>
  </div>

  <style>
    #loading-screen {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: grid;
      place-items: center;
      background:
        linear-gradient(115deg, rgba(0,0,0,.92), rgba(0,0,0,.72)),
        url("/assets/base-principale-fond-site.jpg") center / cover;
      color: #fbbf24;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .loading-scene {
      display: grid;
      gap: 18px;
      justify-items: center;
      width: min(460px, 82vw);
    }
    .loading-scene img {
      width: min(420px, 78vw);
      filter: drop-shadow(0 18px 34px rgba(0,0,0,.52));
    }
    .loading-shell {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: min(360px, 78vw);
    }
    .loading-shell span {
      height: 44px;
      border: 1px solid rgba(251,191,36,.22);
      border-radius: 8px;
      background: linear-gradient(90deg, rgba(255,255,255,.04), rgba(251,191,36,.13), rgba(255,255,255,.04));
      background-size: 220% 100%;
      animation: lsShimmer 1.5s ease-in-out infinite;
    }
    .loading-bar {
      width: min(220px, 62vw);
      height: 3px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
    }
    .loading-bar span {
      display: block;
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg,#fbbf24,#f97316);
      animation: lsBar 1.7s ease-in-out forwards;
    }
    @keyframes lsBar { from { width:0 } to { width:100% } }
    @keyframes lsShimmer { 0% { background-position: 120% 0 } 100% { background-position: -120% 0 } }
  </style>

  <div id="root"></div>

  <!-- Le catalogue de recettes doit être chargé AVANT app.js -->
  <script src="/assets/catalog-1.js?v=110"></script>
  <script src="/assets/catalog-2.js?v=110"></script>
  <script src="/assets/catalog-3.js?v=110"></script>
  <script src="/assets/catalog-4.js?v=110"></script>

  <!-- App React sans transpilation côté navigateur -->
  <script src="/app.js?v=110"></script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js?v=110').then(registration => {
          registration.update().catch(() => {});
        }).catch(() => {});
      });
    }
    // Cacher l'écran de chargement dès que React est monté.
    window.__cookNoteReady = () => {
      const ls = document.getElementById('loading-screen');
      if (ls) {
        ls.style.transition = 'opacity 0.4s ease';
        ls.style.opacity = '0';
        setTimeout(() => ls.remove(), 420);
      }
    };
    // Fallback : si React ne monte pas dans 8s, on retire l'écran de chargement
    // pour ne pas rester bloqué indéfiniment (erreur JS, réseau lent, etc.)
    setTimeout(() => {
      const ls = document.getElementById('loading-screen');
      if (ls) {
        ls.style.transition = 'opacity 0.6s ease';
        ls.style.opacity = '0';
        setTimeout(() => {
          if (ls.parentNode) {
            ls.innerHTML = '<div style="color:#ef4444;font-family:system-ui,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;text-align:center;padding:20px"><p style="font-size:18px;font-weight:700">⚠️ Erreur de chargement</p><p style="font-size:13px;opacity:.7;margin-top:8px">Ouvrez la console (F12) pour voir le détail.</p><button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;background:#fbbf24;border:none;border-radius:8px;cursor:pointer;font-weight:700">↺ Recharger</button></div>';
            ls.style.opacity = '1';
            ls.style.background = '#111';
          }
        }, 650);
      }
    }, 8000);
  </script>
</body>
</html>
