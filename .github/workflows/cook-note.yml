name: Cook Note

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Validate site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Validate generated image manifest
        run: npm run validate:image-manifest

      - name: Run Cook Note checks
        run: npm run check

      - name: Build production artifact
        run: npm run build

      - name: Validate production artifact
        run: npm run validate:dist

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run visual smoke tests
        run: npm run test:visual

      - name: Upload visual smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-smoke
          path: |
            test-results
            playwright-report
          if-no-files-found: ignore

      - name: Upload production artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cook-note-dist
          path: dist
          if-no-files-found: error
