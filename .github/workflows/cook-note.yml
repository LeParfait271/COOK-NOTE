name: Cook Note

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Validate site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Validate generated image manifest
        run: npm run validate:image-manifest

      - name: Run Cook Note checks
        run: npm run check
