<body>
  <!-- Écran de chargement — caché par React au montage (voir app.js) -->
  <div id="loading-screen" aria-hidden="true">
    <div class="loading-scene">
      <img src="/assets/brand/app-icon.png" alt="Cook Note" width="948" height="302" decoding="async" data-art-asset="appIcon" />
      <div class="loading-shell">
        <span></span>
        <span></span>
        <span></span>
      </div>
      <div class="loading-bar"><span></span></div>
    </div>
  </div>

  <style>
    #loading-screen {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      left: 0;
      z-index: 99999;
      display: block;
      background:
        var(--ds-loading-overlay, linear-gradient(115deg, rgba(0,0,0,.92), rgba(0,0,0,.72))),
        var(--art-background-image, url("/assets/theme/dark/global/background.jpg")) center / cover;
      color: var(--ds-color-primary, #fbbf24);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .loading-scene {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 82%;
      max-width: 460px;
      text-align: center;
      transform: translate(-50%, -50%);
    }
    .loading-scene img {
      width: 78%;
      max-width: 420px;
      height: auto;
      filter: drop-shadow(0 18px 34px rgba(0,0,0,.52));
    }
    .loading-shell {
      width: 78%;
      max-width: 360px;
      margin: 18px auto 0;
      font-size: 0;
    }
    .loading-shell span {
      display: inline-block;
      width: 31%;
      height: 44px;
      margin: 0 1%;
      border: 1px solid rgba(251,191,36,.22);
      border-radius: 8px;
      background: linear-gradient(90deg, rgba(255,255,255,.04), rgba(251,191,36,.13), rgba(255,255,255,.04));
      background-size: 220% 100%;
      animation: lsShimmer 1.5s ease-in-out infinite;
    }
    .loading-bar {
      width: 62%;
      max-width: 220px;
      height: 3px;
      margin: 18px auto 0;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
    }
    .loading-bar span {
      display: block;
      height: 100%;
      width: 0;
      border-radius: inherit;
      background: linear-gradient(90deg,#fbbf24,#f97316);
      animation: lsBar 1.7s ease-in-out forwards;
    }
    @keyframes lsBar { from { width:0 } to { width:100% } }
    @keyframes lsShimmer { 0% { background-position: 120% 0 } 100% { background-position: -120% 0 } }
  </style>

  <div id="root"></div>

  <!-- Le catalogue de recettes doit être chargé AVANT app.js -->
  <script src="/assets/vendor/react.production.min.js"></script>
  <script src="/assets/vendor/react-dom.production.min.js"></script>

  <script src="/app-art-images.js?v=320-parent-title"></script>
  <script src="/i18n.js?v=320-parent-title"></script>

  <!-- App React sans transpilation côté navigateur -->
  <script src="/app.js?v=320-parent-title"></script>

  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        let refreshing = false;
        const showUpdateAction = registration => {
          if (!registration || !registration.waiting || document.getElementById('cook-note-update-action')) return;
          const button = document.createElement('button');
          button.id = 'cook-note-update-action';
          button.type = 'button';
          button.textContent = window.CookNoteI18n?.text('Mettre à jour') || 'Mettre à jour';
          button.setAttribute('aria-label', window.CookNoteI18n?.text('Mettre Cook Note à jour') || 'Mettre Cook Note à jour');
          button.style.cssText = [
            'position:fixed',
            'right:18px',
            'bottom:18px',
            'z-index:100000',
            'border:1px solid rgba(251,191,36,.42)',
            'border-radius:999px',
            'padding:11px 16px',
            'background:linear-gradient(135deg,#fbbf24,#f97316)',
            'color:#111827',
            'font:800 13px/1 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif',
            'box-shadow:0 18px 45px rgba(0,0,0,.45)',
            'cursor:pointer'
          ].join(';');
          button.addEventListener('click', () => {
            button.disabled = true;
            button.textContent = window.CookNoteI18n?.text('Mise à jour...') || 'Mise à jour...';
            registration.waiting.postMessage({ type: 'SKIP_WAITING' });
          });
          document.body.appendChild(button);
        };
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          refreshing = true;
          window.location.reload();
        });
        navigator.serviceWorker.register('/service-worker.js?v=320-parent-title').then(registration => {
          showUpdateAction(registration);
          registration.addEventListener('updatefound', () => {
            const worker = registration.installing;
            if (!worker) return;
            worker.addEventListener('statechange', () => {
              if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                showUpdateAction(registration);
              }
            });
          });
          registration.update().catch(() => {});
        }).catch(() => {});
      });
    }
    // Cacher l'écran de chargement dès que React est monté.
    window.__cookNoteReady = () => {
      const ls = document.getElementById('loading-screen');
      if (ls) {
        ls.style.pointerEvents = 'none';
        ls.style.opacity = '0';
        ls.style.display = 'none';
        ls.remove();
      }
    };
    const hideLoaderWhenRootReady = () => {
      const root = document.getElementById('root');
      if (root && root.children.length > 0) {
        window.__cookNoteReady();
        return true;
      }
      return false;
    };
    queueMicrotask(() => {
      if (!hideLoaderWhenRootReady()) {
        requestAnimationFrame(hideLoaderWhenRootReady);
        setTimeout(hideLoaderWhenRootReady, 80);
      }
    });
    // Fallback : si React ne monte pas dans 8s, on retire l'écran de chargement
    // pour ne pas rester bloqué indéfiniment (erreur JS, réseau lent, etc.)
    setTimeout(() => {
      const ls = document.getElementById('loading-screen');
      if (ls) {
        ls.style.transition = 'opacity 0.6s ease';
        ls.style.opacity = '0';
        setTimeout(() => {
          if (ls.parentNode) {
            ls.innerHTML = '<div style="color:#ef4444;font-family:system-ui,-apple-system,BlinkMacSystemFont,&quot;Segoe UI&quot;,sans-serif;text-align:center;padding:20px"><p style="font-size:18px;font-weight:700">⚠️ Erreur de chargement</p><p style="font-size:13px;opacity:.7;margin-top:8px">Ouvrez la console (F12) pour voir le détail.</p><button onclick="location.reload()" style="margin-top:16px;padding:10px 20px;background:#fbbf24;border:none;border-radius:8px;cursor:pointer;font-weight:700">↺ Recharger</button></div>';
            ls.style.opacity = '1';
            ls.style.background = '#111';
          }
        }, 650);
      }
    }, 8000);
  </script>
</body>
